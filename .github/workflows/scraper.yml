name: ML Price Scraper

on:
  schedule:
    - cron: "0 12 * * *"   # Todo dia às 9h da manhã (Brasília)
  workflow_dispatch:        # Botão para rodar manualmente

jobs:
  scrape:
    name: Coletar preços
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Permissão para o robô salvar o arquivo no seu GitHub

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependências
        run: |
          pip install requests beautifulsoup4

      - name: 📁 Preparar ambiente
        run: |
          mkdir -p data logs
          touch data/.gitkeep logs/.gitkeep

      - name: 🔍 Rodar scraper
        run: python scraper.py

      - name: 🚀 Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Adiciona o CSV se ele existir
          if [ -f data/prices.csv ]; then
            git add data/prices.csv
            # O '|| exit 0' evita que o erro pare o processo se não houver mudança nos preços
            git commit -m "chore(data): preços atualizados $(date +'%Y-%m-%d %H:%M')" || echo "Sem mudanças"
            git push origin main
          else
            echo "Erro: prices.csv não foi gerado pelo Python."
            exit 1
          fi

      - name: 📋 Guardar Log (Artefato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_number }}
          path: logs/scraper.log
          retention-days: 5