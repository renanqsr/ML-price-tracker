name: ML Price Scraper

on:
  schedule:
    - cron: "0 12 * * *"   # Todo dia ao meio-dia (UTC) = 9h Brasília
  workflow_dispatch:        # Permite rodar manualmente pela UI do GitHub

jobs:
  scrape:
    name: Coletar preços
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Necessário para fazer commit

    steps:
      # 1. Checkout do repositório
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configurar Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # 3. Instalar dependências
      - name: 📦 Instalar dependências
        run: pip install -r requirements.txt

      # 4. Rodar o scraper
      - name: 🔍 Rodar scraper
        env:
          SEARCH_QUERY: "iphone 15 128gb"
          MAX_RESULTS: "5"
        run: python scraper.py

      # 5. Commit e push caso haja dados novos
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Garante que as mudanças sejam rastreadas
          git add data/prices.csv || echo "Arquivo não encontrado para adicionar"
          
          # Tenta o commit; o '|| exit 0' garante que não dê erro se não houver mudanças
          git commit -m "chore(data): preços atualizados $(date +'%Y-%m-%d %H:%M')" || echo "Sem mudanças para salvar"
          
          # Empurra as mudanças de volta para o repositório
          git push origin main || echo "Nada para dar push"

      # 6. Upload do log como artefato (útil para debug)
      - name: 📋 Upload log
        if: always()          # Roda mesmo se o scraper falhar
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_number }}
          path: logs/scraper.log
          retention-days: 7